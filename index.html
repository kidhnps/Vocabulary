<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 K123 單字大挑戰</title>
<style>
:root {
  --pink: #ff6b9d; --purple: #c44dff; --blue: #4da6ff; --green: #51cf66;
  --yellow: #ffd43b; --orange: #ff922b; --red: #ff6b6b; --cyan: #22b8cf;
  --bg1: #1a1a3e; --bg2: #2d1b69; --card: rgba(255,255,255,0.08);
  --text: #f1f3f5; --text2: #adb5bd;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--text);min-height:100vh;overflow-x:hidden;}

/* BG particles */
.bg-particle{position:fixed;border-radius:50%;pointer-events:none;animation:floatUp linear infinite;opacity:0.3;z-index:0;}
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0deg);opacity:0;}10%{opacity:0.3;}90%{opacity:0.3;}100%{transform:translateY(-10vh) rotate(720deg);opacity:0;}}

.container{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:15px;}

/* Screens */
.screen{display:none;animation:slideIn 0.5s ease;}
.screen.active{display:block;}
@keyframes slideIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

/* Title */
.game-title{text-align:center;padding:25px 0 10px;font-size:2.4em;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--yellow),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:titleBounce 2s ease infinite;}
@keyframes titleBounce{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
.game-subtitle{text-align:center;color:var(--text2);margin-bottom:25px;font-size:1.05em;}

/* Card */
.card{background:var(--card);backdrop-filter:blur(10px);border-radius:20px;padding:25px;margin-bottom:15px;border:1px solid rgba(255,255,255,0.1);}

/* Input */
.input-label{display:block;margin-bottom:8px;font-weight:600;color:var(--cyan);font-size:0.95em;}
.text-input{width:100%;padding:13px 16px;border-radius:14px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:var(--text);font-size:1.05em;outline:none;transition:0.3s;}
.text-input:focus{border-color:var(--pink);box-shadow:0 0 20px rgba(255,107,157,0.2);}
select.text-input{cursor:pointer;}
select.text-input option{background:#2d1b69;color:var(--text);}

/* Grade selector */
.grade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:15px 0;}
.grade-btn{padding:15px 5px;border-radius:14px;border:2px solid transparent;background:rgba(255,255,255,0.06);cursor:pointer;text-align:center;transition:0.3s;color:var(--text);}
.grade-btn:hover{transform:scale(1.05);border-color:rgba(255,255,255,0.2);}
.grade-btn.selected{border-color:var(--yellow);background:rgba(255,212,59,0.12);}
.grade-btn .emoji{font-size:1.8em;display:block;}
.grade-btn .label{font-weight:700;margin-top:4px;font-size:0.9em;}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 28px;border-radius:14px;border:none;font-size:1.05em;font-weight:700;cursor:pointer;transition:0.3s;color:#fff;}
.btn:hover{transform:translateY(-2px);filter:brightness(1.1);}
.btn:active{transform:translateY(0);}
.btn-pink{background:linear-gradient(135deg,var(--pink),#e64980);box-shadow:0 4px 15px rgba(255,107,157,0.4);}
.btn-blue{background:linear-gradient(135deg,var(--blue),#3b82f6);box-shadow:0 4px 15px rgba(77,166,255,0.4);}
.btn-green{background:linear-gradient(135deg,var(--green),#2f9e44);box-shadow:0 4px 15px rgba(81,207,102,0.4);}
.btn-purple{background:linear-gradient(135deg,var(--purple),#9b59b6);box-shadow:0 4px 15px rgba(196,77,255,0.4);}
.btn-orange{background:linear-gradient(135deg,var(--orange),#e67700);box-shadow:0 4px 15px rgba(255,146,43,0.4);}
.btn-block{display:flex;width:100%;}
.btn-sm{padding:10px 18px;font-size:0.9em;}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:15px;}

/* ===== BATTLE SCREEN ===== */
.battle-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
.stat-badge{background:rgba(255,255,255,0.08);padding:8px 14px;border-radius:12px;font-weight:600;font-size:0.9em;}
.stat-badge .val{color:var(--yellow);font-size:1.15em;}

/* HP Bars */
.hp-section{margin-bottom:15px;}
.hp-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.hp-label{font-weight:700;min-width:70px;font-size:0.9em;}
.hp-bar{flex:1;height:18px;background:rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;position:relative;}
.hp-fill{height:100%;border-radius:12px;transition:width 0.5s ease;}
.hp-fill.enemy{background:linear-gradient(90deg,var(--red),var(--orange));}
.hp-fill.player{background:linear-gradient(90deg,var(--green),var(--cyan));}
.hp-text{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:0.75em;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,0.5);}

/* Enemy area */
.enemy-area{text-align:center;padding:15px 0;position:relative;}
.enemy-sprite{font-size:5em;animation:enemyIdle 1.5s ease infinite;display:inline-block;filter:drop-shadow(0 5px 15px rgba(0,0,0,0.3));transition:0.3s;}
@keyframes enemyIdle{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.enemy-sprite.hit{animation:enemyHit 0.5s ease !important;}
@keyframes enemyHit{0%{transform:scale(1);}20%{transform:scale(0.8) rotate(-10deg);filter:brightness(2) drop-shadow(0 5px 15px rgba(0,0,0,0.3));}100%{transform:scale(1);}}
.enemy-sprite.dying{animation:enemyDie 0.8s ease forwards !important;}
@keyframes enemyDie{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.3) rotate(20deg);opacity:0.5;}100%{transform:scale(0) rotate(360deg);opacity:0;}}
.enemy-name{font-weight:700;font-size:1.1em;margin-top:5px;color:var(--orange);}

/* Question */
.question-box{text-align:center;padding:15px 0;}
.q-prompt{font-size:1em;color:var(--text2);margin-bottom:8px;}
.q-word{font-size:2.5em;font-weight:900;background:linear-gradient(135deg,var(--yellow),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:15px;min-height:60px;}
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.choice-btn{padding:14px 10px;border-radius:14px;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);color:var(--text);font-size:1.05em;font-weight:600;cursor:pointer;transition:0.2s;text-align:center;}
.choice-btn:hover{border-color:var(--cyan);background:rgba(77,166,255,0.1);transform:scale(1.03);}
.choice-btn.correct{border-color:var(--green);background:rgba(81,207,102,0.2);animation:popCorrect 0.4s;}
.choice-btn.wrong{border-color:var(--red);background:rgba(255,107,107,0.2);animation:shakeWrong 0.4s;}
@keyframes popCorrect{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
@keyframes shakeWrong{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

/* Timer */
.timer-section{margin:10px 0;}
.timer-bar{width:100%;height:8px;background:rgba(255,255,255,0.1);border-radius:8px;overflow:hidden;}
.timer-fill{height:100%;border-radius:8px;transition:width 0.1s linear;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));}

/* Props */
.props-bar{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.prop-btn{display:flex;flex-direction:column;align-items:center;padding:8px 14px;border-radius:14px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);cursor:pointer;transition:0.3s;color:var(--text);position:relative;min-width:70px;}
.prop-btn:hover:not(.disabled){border-color:var(--yellow);transform:scale(1.08);}
.prop-btn.disabled{opacity:0.35;cursor:not-allowed;}
.prop-btn .prop-icon{font-size:1.5em;}
.prop-btn .prop-name{font-size:0.7em;font-weight:600;margin-top:2px;}
.prop-btn .prop-count{position:absolute;top:-6px;right:-6px;background:var(--pink);color:#fff;width:22px;height:22px;border-radius:50%;font-size:0.75em;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* Feedback */
.battle-feedback{text-align:center;font-size:1.2em;font-weight:700;min-height:35px;margin:8px 0;}
.feedback-correct{color:var(--green);}
.feedback-wrong{color:var(--red);}

/* Damage popup */
.dmg-popup{position:absolute;font-weight:900;font-size:1.5em;animation:dmgFloat 1s forwards;pointer-events:none;z-index:10;}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(1.5);}}

/* Result */
.result-stars{text-align:center;font-size:3em;margin:10px 0;}
.result-score{text-align:center;font-size:3.5em;font-weight:900;background:linear-gradient(135deg,var(--yellow),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:15px 0;}
.result-item{background:rgba(255,255,255,0.05);padding:15px;border-radius:14px;text-align:center;}
.result-item .rl{font-size:0.8em;color:var(--text2);}
.result-item .rv{font-size:1.5em;font-weight:700;color:var(--yellow);}

/* Leaderboard */
.lb-table{width:100%;border-collapse:collapse;}
.lb-table th{padding:10px 8px;text-align:left;color:var(--cyan);border-bottom:2px solid rgba(255,255,255,0.1);font-size:0.85em;}
.lb-table td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.9em;}
.lb-table tr:hover td{background:rgba(255,255,255,0.04);}
.rank-gold{color:#ffd700;font-weight:900;}
.rank-silver{color:#c0c0c0;font-weight:700;}
.rank-bronze{color:#cd7f32;font-weight:700;}

/* New record */
.new-record-banner{text-align:center;padding:15px;margin:10px 0;background:linear-gradient(135deg,rgba(255,212,59,0.12),rgba(255,107,157,0.12));border:2px solid var(--yellow);border-radius:16px;animation:glowPulse 1.5s infinite alternate;}
@keyframes glowPulse{0%{box-shadow:0 0 10px rgba(255,212,59,0.2);}100%{box-shadow:0 0 30px rgba(255,212,59,0.5);}}

/* Shield active indicator */
.shield-active{position:absolute;top:10px;right:10px;font-size:2em;animation:shieldGlow 1s infinite alternate;}
@keyframes shieldGlow{0%{filter:drop-shadow(0 0 5px var(--cyan));}100%{filter:drop-shadow(0 0 15px var(--cyan));}}

/* Hint overlay */
.hint-text{color:var(--yellow);font-size:0.9em;margin-top:5px;animation:fadeIn 0.3s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* Combo */
.combo-text{text-align:center;font-weight:700;min-height:28px;font-size:1.1em;color:var(--orange);}
.combo-text.active{animation:comboPop 0.3s;}
@keyframes comboPop{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}

/* Sound toggle */
.sound-toggle{position:fixed;top:12px;right:12px;z-index:100;background:rgba(255,255,255,0.1);border:none;color:var(--text);width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:1.2em;transition:0.3s;backdrop-filter:blur(5px);}
.sound-toggle:hover{background:rgba(255,255,255,0.2);transform:scale(1.1);}

.hidden{display:none;}

/* Level transition */
.level-transition{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:50;animation:fadeIn 0.3s;}
.level-transition .content{text-align:center;animation:slideIn 0.5s;}
.level-transition .enemy-preview{font-size:6em;animation:enemyIdle 1.5s ease infinite;}
.level-transition .level-text{font-size:1.5em;font-weight:700;color:var(--yellow);margin:10px 0;}
.level-transition .enemy-intro{color:var(--text2);font-size:1.1em;}

/* Responsive */
@media(max-width:400px){
  .game-title{font-size:1.8em;}
  .q-word{font-size:2em;}
  .choices-grid{grid-template-columns:1fr;}
  .grade-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<button class="sound-toggle" id="soundToggle" title="音效開關">🔊</button>
<div id="bgParticles"></div>

<div class="container">
  <!-- WELCOME SCREEN -->
  <div class="screen active" id="screenWelcome">
    <div class="game-title">🌟 K123 單字大挑戰 🌟</div>
    <div class="game-subtitle">打败可愛小怪獸，成為單字大王！</div>
    <div class="card">
      <div style="margin-bottom:15px;">
        <label class="input-label">👤 勇者名稱</label>
        <input type="text" class="text-input" id="playerName" placeholder="輸入你的名字..." maxlength="10" autocomplete="off">
      </div>
      <div>
        <label class="input-label">📚 選擇年級</label>
        <div class="grade-grid">
          <div class="grade-btn selected" data-grade="K" onclick="selectGrade('K')">
            <span class="emoji">🧒</span><span class="label">K 幼兒園</span>
          </div>
          <div class="grade-btn" data-grade="1" onclick="selectGrade('1')">
            <span class="emoji">🎒</span><span class="label">1 年級</span>
          </div>
          <div class="grade-btn" data-grade="2" onclick="selectGrade('2')">
            <span class="emoji">📖</span><span class="label">2 年級</span>
          </div>
          <div class="grade-btn" data-grade="3" onclick="selectGrade('3')">
            <span class="emoji">🎓</span><span class="label">3 年級</span>
          </div>
        </div>
      </div>
      <div style="margin-bottom:15px;">
        <label class="input-label">🗺️ 關卡數量</label>
        <select class="text-input" id="stageCount">
          <option value="3">3 關（快速冒險）</option>
          <option value="5" selected>5 關（標準冒險）</option>
          <option value="8">8 關（史詩冒險）</option>
        </select>
      </div>
      <button class="btn btn-pink btn-block" onclick="startAdventure()">⚔️ 開始冒險！</button>
    </div>
    <div style="text-align:center;margin-top:10px;">
      <button class="btn btn-orange btn-sm" onclick="showScreen('screenLB');renderLB();">🏆 英雄榜</button>
    </div>
  </div>

  <!-- BATTLE SCREEN -->
  <div class="screen" id="screenBattle">
    <div class="battle-header">
      <div class="stat-badge">🏰 第 <span class="val" id="bStage">1</span> 關</div>
      <div class="stat-badge">⚔️ <span class="val" id="bScore">0</span> 分</div>
      <div class="stat-badge">🔥 <span class="val" id="bCombo">0</span> 連擊</div>
    </div>
    <div class="hp-section">
      <div class="hp-row">
        <span class="hp-label" id="enemyNameLabel">👾 小史萊姆</span>
        <div class="hp-bar"><div class="hp-fill enemy" id="enemyHpFill" style="width:100%"><span class="hp-text" id="enemyHpText">3/3</span></div></div>
      </div>
      <div class="hp-row">
        <span class="hp-label">❤️ 勇者</span>
        <div class="hp-bar"><div class="hp-fill player" id="playerHpFill" style="width:100%"><span class="hp-text" id="playerHpText">5/5</span></div></div>
      </div>
    </div>
    <div class="enemy-area" id="enemyArea">
      <div class="enemy-sprite" id="enemySprite">🟢</div>
      <div class="enemy-name" id="enemyNameDisplay">小史萊姆</div>
    </div>
    <div class="timer-section"><div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div></div>
    <div class="props-bar" id="propsBar">
      <div class="prop-btn" id="propHint" onclick="useProp('hint')"><span class="prop-icon">💡</span><span class="prop-name">提示</span><span class="prop-count" id="propHintCount">3</span></div>
      <div class="prop-btn" id="propShield" onclick="useProp('shield')"><span class="prop-icon">🛡️</span><span class="prop-name">護盾</span><span class="prop-count" id="propShieldCount">2</span></div>
      <div class="prop-btn" id="propBomb" onclick="useProp('bomb')"><span class="prop-icon">💣</span><span class="prop-name">炸彈</span><span class="prop-count" id="propBombCount">1</span></div>
      <div class="prop-btn" id="propTime" onclick="useProp('time')"><span class="prop-icon">⏰</span><span class="prop-name">時停</span><span class="prop-count" id="propTimeCount">2</span></div>
    </div>
    <div class="combo-text" id="comboText"></div>
    <div class="question-box">
      <div class="q-prompt" id="qPrompt">這個英文單字的意思是？</div>
      <div class="q-word" id="qWord">apple</div>
      <div id="hintArea"></div>
      <div class="choices-grid" id="choicesGrid"></div>
    </div>
    <div class="battle-feedback" id="battleFeedback"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="screenResult">
    <div class="game-title" style="font-size:1.8em;">📊 冒險結果</div>
    <div id="resultBanner" class="new-record-banner hidden">
      <div style="font-size:2.5em;">🎉🏆🎉</div>
      <div style="font-size:1.2em;font-weight:700;color:var(--yellow);">新紀錄！登上英雄榜！</div>
    </div>
    <div class="card">
      <div class="result-stars" id="resultStars">⭐⭐⭐</div>
      <div class="result-score" id="resultScore">0</div>
      <div style="text-align:center;color:var(--text2);margin-bottom:10px;">分</div>
      <div class="result-grid">
        <div class="result-item"><div class="rl">答對</div><div class="rv" id="rCorrect">0</div></div>
        <div class="result-item"><div class="rl">答錯</div><div class="rv" id="rWrong">0</div></div>
        <div class="result-item"><div class="rl">最高連擊</div><div class="rv" id="rCombo">0</div></div>
        <div class="result-item"><div class="rl">擊敗怪物</div><div class="rv" id="rKills">0</div></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-pink" onclick="startAdventure()">🔄 再挑戰</button>
        <button class="btn btn-orange" onclick="showScreen('screenLB');renderLB();">🏆 英雄榜</button>
        <button class="btn btn-blue" onclick="showScreen('screenWelcome')">🏠 回首頁</button>
      </div>
    </div>
  </div>

  <!-- LEADERBOARD SCREEN -->
  <div class="screen" id="screenLB">
    <div class="game-title" style="font-size:1.8em;">🏆 英雄榜</div>
    <div class="card"><div id="lbContent"></div>
      <div class="btn-group">
        <button class="btn btn-pink" onclick="showScreen('screenWelcome')">🏠 回首頁</button>
        <button class="btn btn-orange btn-sm" onclick="clearLB()">🗑️ 清除紀錄</button>
      </div>
    </div>
  </div>
</div>

<!-- Level transition overlay -->
<div class="level-transition" id="levelTransition" style="display:none">
  <div class="content">
    <div class="level-text" id="ltLevelText">第 1 關</div>
    <div class="enemy-preview" id="ltEnemyPreview">🟢</div>
    <div class="enemy-intro" id="ltEnemyIntro">小史萊姆 出現了！</div>
  </div>
</div>

<script>
// ===== VOCABULARY DATABASE =====
const WORDS = {
  K: [
    {en:'apple',zh:'蘋果'},{en:'cat',zh:'貓'},{en:'dog',zh:'狗'},{en:'fish',zh:'魚'},
    {en:'bird',zh:'鳥'},{en:'milk',zh:'牛奶'},{en:'egg',zh:'蛋'},{en:'sun',zh:'太陽'},
    {en:'moon',zh:'月亮'},{en:'star',zh:'星星'},{en:'book',zh:'書'},{en:'pen',zh:'筆'},
    {en:'red',zh:'紅色'},{en:'blue',zh:'藍色'},{en:'big',zh:'大的'},{en:'small',zh:'小的'},
    {en:'water',zh:'水'},{en:'rice',zh:'米飯'},{en:'hand',zh:'手'},{en:'eye',zh:'眼睛'},
    {en:'ear',zh:'耳朵'},{en:'nose',zh:'鼻子'},{en:'mouth',zh:'嘴巴'},{en:'head',zh:'頭'},
    {en:'cake',zh:'蛋糕'},{en:'duck',zh:'鴨子'},{en:'pig',zh:'豬'},{en:'bear',zh:'熊'},
    {en:'lion',zh:'獅子'},{en:'frog',zh:'青蛙'},{en:'ant',zh:'螞蟻'},{en:'bee',zh:'蜜蜂'},
    {en:'bat',zh:'蝙蝠'},{en:'cow',zh:'牛'},{en:'fox',zh:'狐狸'},{en:'hen',zh:'母雞'},
    {en:'owl',zh:'貓頭鷹'},{en:'rat',zh:'大老鼠'},{en:'crab',zh:'螃蟹'},
    {en:'deer',zh:'鹿'},{en:'goat',zh:'山羊'},{en:'wolf',zh:'狼'},{en:'mouse',zh:'小老鼠'},

// ===== AUDIO ENGINE =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx, soundOn = true;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx();if(audioCtx.state==='suspended')audioCtx.resume();}

function tone(f,d,t='sine',v=0.13){if(!soundOn)return;try{ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}catch(e){}}

function sfxCorrect(){tone(523,0.1);setTimeout(()=>tone(659,0.1),70);setTimeout(()=>tone(784,0.18),140);}
function sfxWrong(){tone(220,0.25,'sawtooth',0.1);setTimeout(()=>tone(165,0.3,'sawtooth',0.1),120);}
function sfxClick(){tone(880,0.05,'sine',0.08);}
function sfxProp(){tone(1047,0.08);setTimeout(()=>tone(1319,0.08),60);setTimeout(()=>tone(1568,0.12),120);}
function sfxShield(){tone(440,0.15,'triangle',0.1);setTimeout(()=>tone(660,0.2,'triangle',0.1),100);}
function sfxBomb(){tone(100,0.4,'sawtooth',0.15);setTimeout(()=>tone(60,0.5,'square',0.1),100);}
function sfxTimeFreeze(){tone(1200,0.1,'sine',0.08);setTimeout(()=>tone(1500,0.15,'sine',0.08),80);}
function sfxCombo(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.12),i*60));}
function sfxLevelUp(){[440,554,659,880].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'triangle',0.12),i*100));}

// ===== GAME STATE =====
let grade='K', stages=[], currentStage=0, playerHp=5, playerMaxHp=5;
let enemyHp=0, enemyMaxHp=0, currentEnemy=null, currentWord=null, currentChoices=[];
let score=0, combo=0, maxCombo=0, totalCorrect=0, totalWrong=0, kills=0;
let props={hint:3,shield:0,bomb:1,time:2};
let shieldActive=false, timeFrozen=false, hintUsed=false;
let qTimer=null, timeLeft=0, timeLimit=12, answering=false;
let usedWords=new Set();

function selectGrade(g){sfxClick();grade=g;document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('selected'));document.querySelector(`.grade-btn[data-grade="${g}"]`).classList.add('selected');}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ===== START ADVENTURE =====
function startAdventure(){
  sfxClick();
  const name=document.getElementById('playerName').value.trim()||'無名勇者';
  document.getElementById('playerName').value=name;
  const stageCount=parseInt(document.getElementById('stageCount').value);
  // Generate stages
  stages=[];
  const pool=[...ENEMY_TYPES];
  for(let i=0;i<stageCount;i++){
    const e=pool[i%pool.length];
    const hpBonus=Math.floor(i/3);
    stages.push({...e, hp:e.hpBase+hpBonus});
  }
  // Reset
  currentStage=0;score=0;combo=0;maxCombo=0;totalCorrect=0;totalWrong=0;kills=0;
  playerHp=5;playerMaxHp=5;
  props={hint:3,shield:2,bomb:1,time:2};
  shieldActive=false;usedWords=new Set();
  showScreen('screenBattle');
  updatePropsUI();
  showLevelTransition();
}

function showLevelTransition(){
  currentEnemy=stages[currentStage];
  enemyHp=currentEnemy.hp;enemyMaxHp=currentEnemy.hp;
  const lt=document.getElementById('levelTransition');
  document.getElementById('ltLevelText').textContent=`第 ${currentStage+1} 關`;
  document.getElementById('ltEnemyPreview').textContent=currentEnemy.emoji;
  document.getElementById('ltEnemyIntro').textContent=`${currentEnemy.name} 出現了！`;
  lt.style.display='flex';
  try{sfxLevelUp();}catch(e){}
  setTimeout(()=>{lt.style.display='none';startBattle();},1800);
}

function startBattle(){
  answering=false;hintUsed=false;
  document.getElementById('bStage').textContent=currentStage+1;
  document.getElementById('bScore').textContent=score;
  document.getElementById('bCombo').textContent=combo;
  document.getElementById('enemyNameLabel').textContent=`${currentEnemy.emoji} ${currentEnemy.name}`;
  document.getElementById('enemySprite').textContent=currentEnemy.emoji;
  document.getElementById('enemySprite').className='enemy-sprite';
  document.getElementById('enemyNameDisplay').textContent=currentEnemy.name;
  document.getElementById('battleFeedback').textContent='';
  document.getElementById('hintArea').innerHTML='';
  updateHpBars();
  nextQuestion();
}

function updateHpBars(){
  const ep=Math.max(0,enemyHp/enemyMaxHp*100);
  const pp=Math.max(0,playerHp/playerMaxHp*100);
  document.getElementById('enemyHpFill').style.width=ep+'%';
  document.getElementById('enemyHpText').textContent=`${Math.max(0,enemyHp)}/${enemyMaxHp}`;
  document.getElementById('playerHpFill').style.width=pp+'%';
  document.getElementById('playerHpText').textContent=`${Math.max(0,playerHp)}/${playerMaxHp}`;
}

function updatePropsUI(){
  document.getElementById('propHintCount').textContent=props.hint;
  document.getElementById('propShieldCount').textContent=props.shield;
  document.getElementById('propBombCount').textContent=props.bomb;
  document.getElementById('propTimeCount').textContent=props.time;
  document.getElementById('propHint').classList.toggle('disabled',props.hint<=0);
  document.getElementById('propShield').classList.toggle('disabled',props.shield<=0||shieldActive);
  document.getElementById('propBomb').classList.toggle('disabled',props.bomb<=0);
  document.getElementById('propTime').classList.toggle('disabled',props.time<=0);
}

// ===== QUESTIONS =====
function nextQuestion(){
  if(playerHp<=0){endAdventure();return;}
  if(enemyHp<=0){
    kills++;
    const sprite=document.getElementById('enemySprite');
    sprite.className='enemy-sprite dying';
    sfxVictory();
    setTimeout(()=>{
      currentStage++;
      if(currentStage>=stages.length){endAdventure();}
      else{showLevelTransition();}
    },1000);
    return;
  }
  answering=false;hintUsed=false;
  document.getElementById('hintArea').innerHTML='';
  document.getElementById('battleFeedback').textContent='';
  // Pick word & choices (no repeats)
  const wordPool=WORDS[grade];
  let available=wordPool.filter(w=>!usedWords.has(w.en));
  if(available.length<4){usedWords.clear();available=wordPool;}
  const correct=available[Math.floor(Math.random()*available.length)];
  usedWords.add(correct.en);
  currentWord=correct;
  let wrongs=wordPool.filter(w=>w.zh!==correct.zh).sort(()=>Math.random()-0.5).slice(0,3);
  currentChoices=[correct,...wrongs].sort(()=>Math.random()-0.5);
  // Render
  document.getElementById('qPrompt').textContent='這個英文單字的意思是？';
  document.getElementById('qWord').textContent=correct.en;
  const grid=document.getElementById('choicesGrid');
  grid.innerHTML='';
  currentChoices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=c.zh;
    btn.onclick=()=>selectAnswer(i,btn);
    grid.appendChild(btn);
  });
  // Timer
  timeLimit = grade==='K'?15:grade==='1'?12:grade==='2'?10:8;
  timeLeft=timeLimit;timeFrozen=false;
  document.getElementById('timerFill').style.width='100%';
  clearInterval(qTimer);
  qTimer=setInterval(()=>{
    if(timeFrozen)return;
    timeLeft-=0.1;
    if(timeLeft<=0){timeLeft=0;clearInterval(qTimer);handleTimeout();}
    document.getElementById('timerFill').style.width=(timeLeft/timeLimit*100)+'%';
  },100);
}

function selectAnswer(idx,btn){
  if(answering)return;
  answering=true;clearInterval(qTimer);
  const correct=currentChoices[idx]===currentWord;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    const ci=currentChoices.indexOf(currentWord);
    if(currentChoices.indexOf(currentChoices[[...document.querySelectorAll('.choice-btn')].indexOf(b)])===ci)b.classList.add('correct');
  });
  if(correct){
    btn.classList.add('correct');
    sfxCorrect();
    combo++;if(combo>maxCombo)maxCombo=combo;
    totalCorrect++;
    const dmg=1+Math.floor(combo/3);
    enemyHp-=dmg;
    score+=10+combo*2;
    document.getElementById('bScore').textContent=score;
    document.getElementById('bCombo').textContent=combo;
    document.getElementById('battleFeedback').textContent=getCorrectMsg();
    document.getElementById('battleFeedback').className='battle-feedback feedback-correct';
    // Enemy hit animation
    const sprite=document.getElementById('enemySprite');
    sprite.className='enemy-sprite hit';
    setTimeout(()=>sprite.className='enemy-sprite',500);
    showDmgPopup(`-${dmg}`,true);
    if(combo>=3){sfxCombo();showComboText(`🔥 ${combo} 連擊！傷害+${dmg}`);}
    else if(combo>=2){showComboText(`⚡ ${combo} 連擊`);}
    else{document.getElementById('comboText').textContent='';}
    updateHpBars();
    setTimeout(()=>nextQuestion(),900);
  } else {
    btn.classList.add('wrong');
    // Highlight correct
    document.querySelectorAll('.choice-btn').forEach((b,bi)=>{if(currentChoices[bi]===currentWord)b.classList.add('correct');});
    if(shieldActive){
      shieldActive=false;sfxShield();
      document.getElementById('battleFeedback').textContent='🛡️ 護盾擋住了一次傷害！';
      document.getElementById('battleFeedback').className='battle-feedback';
      showDmgPopup('🛡️',false);
    } else {
      sfxWrong();combo=0;totalWrong++;playerHp--;
      document.getElementById('bCombo').textContent=combo;
      document.getElementById('battleFeedback').textContent=`${getWrongMsg()} 正確答案：${currentWord.zh}`;
      document.getElementById('battleFeedback').className='battle-feedback feedback-wrong';
      showDmgPopup('-1 ❤️',false);
    }
    document.getElementById('comboText').textContent='';
    updateHpBars();updatePropsUI();
    setTimeout(()=>nextQuestion(),1600);
  }
}

function handleTimeout(){
  if(answering)return;answering=true;
  if(shieldActive){
    shieldActive=false;sfxShield();
    document.getElementById('battleFeedback').textContent='🛡️ 護盾擋住了超時懲罰！';
    document.getElementById('battleFeedback').className='battle-feedback';
  } else {
    sfxWrong();combo=0;totalWrong++;playerHp--;
    document.getElementById('bCombo').textContent=combo;
    document.getElementById('battleFeedback').textContent=`⏰ 時間到！正確答案：${currentWord.zh}`;
    document.getElementById('battleFeedback').className='battle-feedback feedback-wrong';
    showDmgPopup('-1 ❤️',false);
  }
  document.getElementById('comboText').textContent='';
  // Highlight correct
  document.querySelectorAll('.choice-btn').forEach((b,bi)=>{if(currentChoices[bi]===currentWord)b.classList.add('correct');});
  updateHpBars();updatePropsUI();
  setTimeout(()=>nextQuestion(),1600);
}

// ===== PROPS =====
function useProp(type){
  if(answering)return;
  if(type==='hint'&&props.hint>0){
    props.hint--;sfxProp();hintUsed=true;
    const first=currentWord.zh[0];
    document.getElementById('hintArea').innerHTML=`<div class="hint-text">💡 提示：答案是以「${first}」開頭</div>`;
    // Remove wrong choices that don't match hint
    updatePropsUI();
  }
  else if(type==='shield'&&props.shield>0&&!shieldActive){
    props.shield--;shieldActive=true;sfxShield();
    document.getElementById('battleFeedback').textContent='🛡️ 護盾啟動！下次答錯不會扣血';
    document.getElementById('battleFeedback').className='battle-feedback';
    updatePropsUI();
  }
  else if(type==='bomb'&&props.bomb>0){
    props.bomb--;sfxBomb();
    enemyHp-=2;score+=5;
    document.getElementById('bScore').textContent=score;
    const sprite=document.getElementById('enemySprite');
    sprite.className='enemy-sprite hit';setTimeout(()=>sprite.className='enemy-sprite',500);
    showDmgPopup('💥 -2',true);
    document.getElementById('battleFeedback').textContent='💣 炸彈攻擊！造成 2 點傷害！';
    document.getElementById('battleFeedback').className='battle-feedback feedback-correct';
    updateHpBars();updatePropsUI();
    if(enemyHp<=0)setTimeout(()=>nextQuestion(),800);
  }
  else if(type==='time'&&props.time>0){
    props.time--;sfxTimeFreeze();timeFrozen=true;
    document.getElementById('battleFeedback').textContent='⏰ 時間凍結！不用擔心計時器了';
    document.getElementById('battleFeedback').className='battle-feedback';
    updatePropsUI();
  }
}

function showDmgPopup(text,onEnemy){
  const area=document.getElementById('enemyArea');
  const d=document.createElement('div');
  d.className='dmg-popup';
  d.textContent=text;
  d.style.color=onEnemy?'var(--green)':'var(--red)';
  d.style.left=Math.random()*60+20+'%';
  d.style.top='30%';
  area.appendChild(d);
  setTimeout(()=>d.remove(),1000);
}

function showComboText(t){
  const el=document.getElementById('comboText');
  el.textContent=t;el.className='combo-text active';
  setTimeout(()=>el.className='combo-text',300);
}

function getCorrectMsg(){const m=['太棒了！✨','好厲害！💪','正確！🌟','漂亮！🎉','完美！🔥','厲害死了！😎','答對了！⚡'];return m[Math.floor(Math.random()*m.length)];}
function getWrongMsg(){const m=['嗚嗚～💦','再加油！','哎呀～🤔','別灰心！💪','下次會更好！'];return m[Math.floor(Math.random()*m.length)];}

// ===== END ADVENTURE =====
function endAdventure(){
  clearInterval(qTimer);
  const won=playerHp>0;
  const total=totalCorrect+totalWrong;
  const acc=total>0?Math.round(totalCorrect/total*100):0;
  const finalScore=Math.round(score*(acc/100)+maxCombo*5+kills*10);
  if(won)sfxVictory();else sfxGameOver();
  // Stars
  let starCount=finalScore>=200?3:finalScore>=100?2:finalScore>0?1:0;
  document.getElementById('resultStars').textContent='⭐'.repeat(starCount)||'💔';
  document.getElementById('resultScore').textContent=finalScore;
  document.getElementById('rCorrect').textContent=totalCorrect;
  document.getElementById('rWrong').textContent=totalWrong;
  document.getElementById('rCombo').textContent=maxCombo;
  document.getElementById('rKills').textContent=kills;
  // Save
  const name=document.getElementById('playerName').value.trim()||'無名勇者';
  const record={name,score:finalScore,correct:totalCorrect,total,combo:maxCombo,kills,grade,won,date:new Date().toLocaleDateString()};
  let lb=getLB();
  const wasTop=lb.length<10||lb.length>=10&&finalScore>(lb[lb.length-1]?.score||0);
  lb.push(record);lb.sort((a,b)=>b.score-a.score);lb=lb.slice(0,20);
  localStorage.setItem('k123_lb',JSON.stringify(lb));
  const rank=lb.findIndex(r=>r.name===record.name&&r.score===record.score)+1;
  const banner=document.getElementById('resultBanner');
  if(rank<=10&&wasTop){banner.classList.remove('hidden');setTimeout(sfxRecord,500);}
  else{banner.classList.add('hidden');}
  showScreen('screenResult');
}

// ===== LEADERBOARD =====
function getLB(){try{return JSON.parse(localStorage.getItem('k123_lb')||'[]');}catch{return[];}}
function clearLB(){if(confirm('確定清除所有英雄榜紀錄？')){localStorage.removeItem('k123_lb');renderLB();sfxClick();}}
function renderLB(){
  const lb=getLB();
  const medals=['🥇','🥈','🥉'];
  const gradeNames={K:'K 幼兒園','1':'1年級','2':'2年級','3':'3年級'};
  let h='';
  if(!lb.length)h='<div style="text-align:center;padding:40px;color:var(--text2);">尚無紀錄<br>快來挑戰吧！🌟</div>';
  else{
    h='<table class="lb-table"><thead><tr><th>排名</th><th>勇者</th><th>分數</th><th>正確率</th><th>連擊</th><th>年級</th></tr></thead><tbody>';
    lb.forEach((r,i)=>{
      const rc=i<3?['rank-gold','rank-silver','rank-bronze'][i]:'';
      const m=i<3?`<span style="font-size:1.3em">${medals[i]}</span>`:(i+1);
      const acc=r.total>0?Math.round(r.correct/r.total*100):0;
      h+=`<tr class="${rc}"><td>${m}</td><td>${esc(r.name)}</td><td>${r.score}</td><td>${acc}%</td><td>${r.combo}</td><td>${gradeNames[r.grade]||r.grade}</td></tr>`;
    });
    h+='</tbody></table>';
  }
  document.getElementById('lbContent').innerHTML=h;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

window.addEventListener('load',()=>document.getElementById('playerName').focus());
</script>
